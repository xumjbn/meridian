# WebSocket 升级所需的 Connection 头映射（http 上下文，由 conf.d 引入）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 前端静态资源 + SPA 路由回退（并强制每次验证 index.html 以避免强缓存老页面）
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 针对哈希命名的静态文件进行一年强缓存（Vite 会产生带 hash 的新文件名）
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpe?g|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 后端 API 与 WebSocket / SSE 反向代理
    # 覆盖 /api/ws/terminal/:id（终端）与 /api/tasks/:id/stream（扫描日志 SSE）
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 升级
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 终端 / SSE 是长连接：关闭缓冲并放长超时
        proxy_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
